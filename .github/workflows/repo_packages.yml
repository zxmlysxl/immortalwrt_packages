name: Sync Golang Repo
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync sbwml/packages_lang_golang
        run: |
          # 配置目标路径和分支
          REPO_URL="https://github.com/sbwml/packages_lang_golang.git"
          DEST_DIR="lang/golang"
          BRANCH="25.x"

          # 清理旧数据（可选）
          rm -rf "$DEST_DIR" || true
          mkdir -p "$DEST_DIR"

          # 克隆仓库（浅克隆节省时间）
          echo "🔁 正在克隆 $REPO_URL (分支: $BRANCH)..."
          git clone --depth 1 --branch "$BRANCH" "$REPO_URL" "$DEST_DIR" || {
            echo "❌ 克隆失败，尝试默认分支..."
            git clone --depth 1 "$REPO_URL" "$DEST_DIR"
            cd "$DEST_DIR"
            git checkout "$BRANCH" || {
              echo "⚠️ 分支 $BRANCH 不存在，使用默认分支"
              git checkout -b "$BRANCH" origin/HEAD
            }
            cd -
          }

          # 清理.git目录（避免冲突）
          rm -rf "$DEST_DIR/.git"

          echo "✅ 同步完成！"

      - name: Commit Changes
        if: success()
        run: |
          git config user.name "zxmlysxl"
          git config user.email "zxmlysxl@gmail.com"
          git add .
          if git diff --cached --quiet; then
            echo "🟢 无变更需要提交"
          else
            git commit -m "Sync: sbwml/packages_lang_golang $(date +'%Y-%m-%d')"
            git push origin main
          fi
