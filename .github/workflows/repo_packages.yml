name: Sync Golang Repo
on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 0 点自动运行
  workflow_dispatch:     # 支持手动触发

jobs:
  sync-repo:
    runs-on: ubuntu-latest
    timeout-minutes: 5   # 超时时间 5 分钟足够

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync sbwml/packages_lang_golang
        run: |
          # 设置目标仓库和分支
          REPO_URL="https://github.com/sbwml/packages_lang_golang.git"
          TARGET_DIR="lang/golang"
          BRANCH="25.x"

          # 删除旧数据（如果存在）
          rm -rf "$TARGET_DIR" 2>/dev/null || true
          mkdir -p "$TARGET_DIR"

          # 克隆目标仓库（仅最新 commit）
          echo "🔄 Syncing $REPO_URL (branch: $BRANCH)..."
          git clone --depth 1 --branch "$BRANCH" "$REPO_URL" "$TARGET_DIR"

          # 删除 .git 文件夹避免冲突
          rm -rf "$TARGET_DIR/.git"

      - name: Commit changes
        run: |
          git config user.name "zxmlysxl"
          git config user.email "zxmlysxl@gmail.com"

          if git diff --quiet; then
            echo "✅ No changes to commit"
          else
            git add .
            git commit -m "chore: sync golang repo $(date +'%Y-%m-%d')"
            git push
          fi
